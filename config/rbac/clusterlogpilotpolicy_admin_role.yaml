# This rule is not used by the project logpilot itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over logpilot.logpilot.jimyag.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: logpilot
    app.kubernetes.io/managed-by: kustomize
  name: clusterlogpilotpolicy-admin-role
rules:
- apiGroups:
  - logpilot.logpilot.jimyag.com
  resources:
  - clusterlogpilotpolicies
  verbs:
  - '*'
- apiGroups:
  - logpilot.logpilot.jimyag.com
  resources:
  - clusterlogpilotpolicies/status
  verbs:
  - get
